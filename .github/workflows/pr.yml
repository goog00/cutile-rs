---
name: pr

on:
  push:
    branches:
      - "pull-request/[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash -eou pipefail {0}

jobs:
  build:
    runs-on: linux-amd64-cpu16
    container:
      image: nvidia/cuda:13.3.0-devel-ubuntu24.04
      env:
        DEBIAN_FRONTEND: noninteractive
    env:
      CUDA_TOOLKIT_PATH: /usr/local/cuda
    timeout-minutes: 30
    steps:
      - name: Install basic dependencies
        run: |
          apt update
          apt install -y --no-install-recommends build-essential curl \
            ca-certificates git cmake pkg-config libclang-dev zlib1g-dev \
            libzstd-dev

      - name: Verify CUDA toolchain
        run: |
          nvcc --version
          command -v tileiras
          tileiras --help | grep -q "sm_120"

      - name: Clone repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "${HOME}/.cargo/env"
          rustup default nightly

      - name: TileIR toolchain smoke test
        run: |
          source "${HOME}/.cargo/env"
          command -v tileiras
          cargo test -p cutile-ir --test bytecode_validate simple_arithmetic -- --exact --nocapture

      - name: Build
        run: |
          source "${HOME}/.cargo/env"
          cargo build

      - name: Format check
        run: |
          source "${HOME}/.cargo/env"
          cargo fmt -- --check

      - name: Clippy
        run: |
          source "${HOME}/.cargo/env"
          cargo clippy

      - name: Test (compile only)
        run: |
          source "${HOME}/.cargo/env"
          cargo test --no-run

      - name: CPU only tests
        run: |
          source "${HOME}/.cargo/env"
          ./scripts/run_cpu_tests.sh
